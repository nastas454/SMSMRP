version: "3.9"

services:

  backend:
    build: .
    container_name: back-1
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://mirnast:123123@db:5432/dyplomna

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: mirnast
      POSTGRES_PASSWORD: 123123
      POSTGRES_DB: dyplomna
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./frontend
    container_name: web-1
    ports:
    - "80:80"
    restart: unless-stopped
    depends_on:
    - backend

  minio:
    image: minio/minio
    container_name: local_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "12345678"
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data

volumes:
  postgres_data: