<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проходження курсу | Rehabilitation Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/course_completion.css"> </head>
<body>

<header class="top-header">
  <div class="logo-area" onclick="window.location.href='home_page.html'" style="cursor: pointer;">
    <img src="img/Лого.svg" alt="Logo" class="header-logo">
    <span class="platform-name">Rehabilitation Platform</span>
  </div>

  <div class="header-actions">
    <a href="account_page.html" class="user-profile" title="Мій профіль">
      <div class="avatar-circle-cp">
        <i class="fas fa-user"></i>
      </div>
    </a>
    <a href="#" class="logout-btn" title="Вийти" onclick="logoutUser(event)">
      <i class="fas fa-sign-out-alt"></i>
    </a>
  </div>
</header>

<main class="execution-main">

  <div class="nav-btn-container">
    <button id="btn-prev" class="nav-btn" onclick="prevExercise()">
      <i class="fas fa-arrow-left"></i> Назад
    </button>
  </div>

  <div class="execution-card">
    <div class="day-header" id="display-day">ЗАНЯТТЯ 1</div>

    <div class="exercise-content" id="exercise-container">
      <h3 class="exercise-number" id="display-exercise-title">Вправа 1: Тяга гумової стрічки до поясу</h3>

      <div class="form-row">
        <div class="input-group">
          <label>ПОВТОРИ</label>
          <div class="readonly-field" id="display-reps">15</div>
        </div>
        <div class="input-group">
          <label>ПІДХОДИ</label>
          <div class="readonly-field" id="display-sets">3</div>
        </div>
      </div>

      <div class="input-group">
        <label>ОПИС ВИКОНАННЯ</label>
        <div class="readonly-field multiline" id="display-desc">Тримайте спину рівною...</div>
      </div>

      <div class="input-group">
        <label>РЕКОМЕНДАЦІЇ</label>
        <div class="readonly-field multiline" id="display-rec">Зверніть увагу на дихання...</div>
      </div>

      <div class="input-group">
        <label>ПОСИЛАННЯ НА ВІДЕО</label>
        <div class="readonly-field">
          <a href="#" target="_blank" id="display-video" class="video-link">https://youtube.com/...</a>
        </div>
      </div>
    </div>

    <div class="feedback-content" id="feedback-container" style="display: none;">
      <h3 class="exercise-number">Як пройшло заняття?</h3>

      <div class="form-row">
        <div class="input-group">
          <label>Рівень болю (1-10): <span id="pain-val" class="range-val">5</span></label>
          <input type="range" id="pain-range" min="1" max="10" value="5" class="custom-range" oninput="document.getElementById('pain-val').textContent = this.value">
        </div>
        <div class="input-group">
          <label>Складність (1-10): <span id="diff-val" class="range-val">5</span></label>
          <input type="range" id="difficulty-range" min="1" max="10" value="5" class="custom-range" oninput="document.getElementById('diff-val').textContent = this.value">
        </div>
      </div>

      <div class="input-group" style="margin-top: 15px;">
        <label>Ваші нотатки / Самопочуття</label>
        <textarea id="feedback-notes" class="custom-textarea" placeholder="Опишіть, що ви відчували під час виконання..."></textarea>
      </div>
    </div>

  </div>

  <div class="nav-btn-container">
    <button id="btn-next" class="nav-btn" onclick="nextExercise()">
      Далі <i class="fas fa-arrow-right"></i>
    </button>
  </div>

  <div id="status-container" class="status-panel" style="display: none;">
    <div class="status-content">
      <i id="status-icon" class="fas fa-hourglass-half"></i>
      <h2 id="status-title">Час відпочити!</h2>
      <p id="status-message">Наступне заняття курсу відкриється через:</p>
      <div id="timer-display" class="timer-text">-- год. -- хв.</div>

      <button class="status-back-btn" onclick="goBack(event)">Повернутися до курсу</button>
    </div>
  </div>

</main>

<script src="js/course_completion.js"></script> </body>
</html>
