<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Користувачі | Адмін-панель</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/home_page_for_admin.css">
</head>
<body>

<header class="top-header">
  <div class="logo-area">
    <img src="img/Лого.svg" alt="Logo" class="header-logo"> <span class="platform-name">Rehabilitation Platform</span>
  </div>

  <div class="header-actions">
    <a href="account_page.html" class="user-profile" title="Мій профіль">
      <div class="avatar-circle">
        <i class="fas fa-user"></i>
      </div>
    </a>

    <a href="main_and_auth.html" class="logout-btn" title="Вийти" onclick="logoutUser(event)">
      <i class="fas fa-sign-out-alt"></i>
    </a>
  </div>
</header>

<div class="layout-container">

  <aside class="sidebar">
    <h3 class="sidebar-title1">Адміністрування</h3>
    <nav class="nav-menu">
      <button class="nav-btn active" onclick="switchTab('patients', this)">
        <i class="fas fa-user-injured"></i> Пацієнти
      </button>
      <button class="nav-btn" onclick="switchTab('doctors', this)">
        <i class="fas fa-user-md"></i> Лікарі
      </button>
      <button class="nav-btn" onclick="switchTab('admins', this)">
        <i class="fas fa-user-shield"></i> Адміністратори
      </button>
    </nav>

    <footer class="sidebar-footer">
      <p>© 2026 Rehabilitation Platform. Всі права захищено.</p>
      <div class="social-icons">
        <a href="https://www.instagram.com/yamamukushala/?hl=uk" target="_blank" title="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
        <a href="http://t.me/YaMamuKushala" target="_blank" title="Telegram">
          <i class="fab fa-telegram"></i>
        </a>
      </div>
    </footer>
  </aside>

  <main class="main-content">
    <header class="header">
      <h1 id="page-title">Користувачі: Пацієнти</h1>
      <div class="header-buttons">
        <button id="btn-create-doctor" class="create-btn" onclick="openModal('modal-doctor')">
          <i class="fas fa-plus"></i> Створити лікаря
        </button>
        <button id="btn-create-admin" class="create-btn" onclick="openModal('modal-admin')">
          <i class="fas fa-plus"></i> Створити адміна
        </button>
      </div>
    </header>
    <div class="table-container">
      <table class="users-table">
        <thead>
        <tr>
          <th>ID</th>
          <th>Дані користувача</th>
          <th>Дата створення</th>
          <th>Стан</th>
          <th>Статус (Дії)</th>
        </tr>
        </thead>
        <tbody id="users-tbody">
        </tbody>
      </table>
    </div>
  </main>

</div>

<div id="modal-doctor" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal('modal-doctor')">&times;</span>
    <h2>Створити лікаря</h2>
    <form id="form-create-doctor" onsubmit="handleCreateUser(event, '/admin/doctor/create', 'modal-doctor')">
      <div class="form-group">
        <label>Ім'я:</label>
        <input type="text" name="first_name" required>
      </div>
      <div class="form-group">
        <label>Прізвище:</label>
        <input type="text" name="last_name" required>
      </div>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>Логін:</label>
        <input type="text" name="login" required>
      </div>
      <div class="form-group">
        <label>Пароль:</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="create-btn active" style="width: 100%; justify-content: center;">Зберегти</button>
    </form>
  </div>
</div>

<div id="modal-admin" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal('modal-admin')">&times;</span>
    <h2>Створити адміністратора</h2>
    <form id="form-create-admin" onsubmit="handleCreateUser(event, '/admin/create', 'modal-admin')">
      <div class="form-group">
        <label>Ім'я:</label>
        <input type="text" name="first_name" required>
      </div>
      <div class="form-group">
        <label>Прізвище:</label>
        <input type="text" name="last_name" required>
      </div>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>Логін:</label>
        <input type="text" name="login" required>
      </div>
      <div class="form-group">
        <label>Пароль:</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="create-btn active" style="width: 100%; justify-content: center;">Зберегти</button>
    </form>
  </div>
</div>

<script src="js/home_page_for_admin.js"></script>
</body>
</html>
