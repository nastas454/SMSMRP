<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Акаунт | Rehabilitation Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/account_page.css">
</head>
<body>

<header class="top-header">
  <div class="logo-area" onclick="window.location.href='home_page.html'" style="cursor: pointer;">
    <img src="img/Лого.svg" alt="Logo" class="header-logo">
    <span class="platform-name">Rehabilitation Platform</span>
  </div>

  <div class="header-actions">
    <a href="#" class="logout-btn" title="Вийти" onclick="logoutUser(event)">
      <i class="fas fa-sign-out-alt"></i>
    </a>
  </div>
</header>

<main class="account-main">
  <div class="top-navigation">
    <a href="home_page.html" class="back-home-btn"> ⬅️ Назад </a>
  </div>

  <div class="account-container">

    <div class="profile-card">
      <div class="profile-header">
        <div class="avatar-large">
          <i class="fas fa-user-md"></i>
        </div>
        <h2 id="display-login" class="profile-login">логін</h2>
      </div>

      <div class="profile-details">
        <div class="detail-row">
          <div class="detail-item">
            <span class="detail-label">ім'я</span>
            <span class="detail-value" id="display-name">-</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">стать</span>
            <span class="detail-value" id="display-gender">-</span>
          </div>
        </div>

        <div class="detail-row">
          <div class="detail-item">
            <span class="detail-label">прізвище</span>
            <span class="detail-value" id="display-surname">-</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">вік</span>
            <span class="detail-value" id="display-age">-</span>
          </div>
        </div>

        <div class="detail-row full-width">
          <div class="detail-item">
            <span class="detail-label">email</span>
            <span class="detail-value" id="display-email">-</span>
          </div>
        </div>

        <div class="detail-row full-width borderless">
          <div class="detail-item">
            <span class="detail-label">пароль</span>
            <span class="detail-value">********</span>
          </div>
        </div>
      </div>

      <button id="delete-account-btn" class="delete-account-btn">
        <i class="fas fa-trash-alt"></i> видалити акаунт
      </button>
    </div>

    <div class="edit-card edit-card-container">
      <h3 class="edit-title">Змінити особисту інформацію</h3>

      <form id="edit-profile-form" class="edit-form">
        <div class="form-row">
          <div class="input-group">
            <label for="input-name">ІМ'Я</label>
            <input type="text" id="input-name" placeholder="">
          </div>
          <div class="input-group">
            <label for="input-login">ЛОГІН</label>
            <input type="text" id="input-login" placeholder="">
          </div>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label for="input-surname">ПРІЗВИЩЕ</label>
            <input type="text" id="input-surname" placeholder="">
          </div>
          <div class="input-group">
            <label for="input-password">ПАРОЛЬ</label>
            <input type="password" id="input-password" placeholder="Новий пароль (за бажанням)">
          </div>
        </div>

        <div class="form-row">
          <div class="input-group half-width">
            <label for="input-age">ВІК</label>
            <input type="number" id="input-age" placeholder="">
          </div>
        </div>

        <div class="form-row">
          <div class="input-group half-width">
            <label for="input-email">EMAIL</label>
            <input type="email" id="input-email" placeholder="">
          </div>
        </div>

        <button type="submit" class="submit-changes-btn">підтвердити зміни</button>
      </form>
    </div>

  </div>
</main>

<script src="js/utils.js"></script>
<script src="js/account_page.js"></script>

</body>
</html>
